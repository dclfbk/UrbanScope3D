name: Build (Next static export)

# Verifica solo che `next build` esca pulito a ogni push.
# Il deploy su GitHub Pages e' temporaneamente disattivato: il repo
# dclfbk/UrbanScope3D non ha ancora Pages abilitato (Settings -> Pages
# -> Source: GitHub Actions) e il deploy fallirebbe. Intanto il deploy
# pubblico avviene su Vercel via integration.
#
# Quando Pages sara' attivo, aggiungere sotto il job `build`:
#
#   - uses: actions/configure-pages@v5
#   - uses: actions/upload-pages-artifact@v3
#     with:
#       path: web/out
#
#   deploy:
#     needs: build
#     runs-on: ubuntu-latest
#     permissions:
#       pages: write
#       id-token: write
#     environment:
#       name: github-pages
#       url: ${{ steps.deployment.outputs.page_url }}
#     steps:
#       - id: deployment
#         uses: actions/deploy-pages@v4

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    env:
      # Il basePath qui e' impostato gia' come servira' su Pages, cosi'
      # il build CI verifica anche la compatibilita' con il path finale.
      NEXT_PUBLIC_BASE_PATH: /UrbanScope3D
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run build
